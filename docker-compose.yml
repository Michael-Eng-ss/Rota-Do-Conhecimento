version: "3.8"

services:
  # ---- PostgreSQL Local ----
  db:
    image: postgres:17
    container_name: quizgame-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quizgame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizgame123}
      POSTGRES_DB: ${POSTGRES_DB:-quizgame}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizgame"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Frontend (React/Vite) ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:8000}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-your-anon-key}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-local}
    container_name: quizgame-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
