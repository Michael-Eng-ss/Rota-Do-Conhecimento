version: '3.8'

services:

  db:
    image: postgres:15
    container_name: quiz-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-quizgame}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quizgame123}
      POSTGRES_DB: ${DB_NAME:-quizgame}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quizgame} -d ${DB_NAME:-quizgame}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: quiz-back
    restart: always
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-quizgame}
      DB_PASSWORD: ${DB_PASSWORD:-quizgame123}
      DB_NAME: ${DB_NAME:-quizgame}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-}
    container_name: quiz-front
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: